<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我，和我的对话 - 主首页</title>
    <style>
        /* ========================================================
           🖼️ 【主页卡片独立图标图片素材一键替换中心】
           ======================================================== */
        :root {
            /* 💡 后期如果你有了自己的卡片图标图片，直接把路径写在 url() 里面（例如：url("素材/icon_aid.png")） */
            /* 💡 如果继续维持使用原生 Emoji 符号，请保持其不变或填 none 即可 */
            --custom-icon-img-1: none; /* 情绪急救包 自定义图 */
            --custom-icon-img-2: none; /* 给情绪降温 自定义图 */
            --custom-icon-img-3: none; /* 注入积极能量 自定义图 */
            --custom-icon-img-4: none; /* 正念冥想空间 自定义图 */

            /* 复用截图中最柔和高档的马卡龙浅柔黄底色 */
            --main-yellow-skin-bg: #fffdf2; 
            --text-main-color: #3d342e;
            --text-sub-color: #7f6e67;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        
        /* 🛠️ 升级点：让整个主页背景铺满 100vw、100vh 整个电脑视窗 */
        body { 
            background-color: var(--main-yellow-skin-bg); 
            width: 100vw;
            height: 100vh;
            display: flex; 
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow: hidden; 
        }

        /* 🛠️ 升级点：PC端全屏黄金中央面板流式骨架 */
        .pc-fullscreen-center-deck {
            width: 100%;
            max-width: 820px; /* 锁定电脑端最规整的2*2矩阵黄金视觉舒适线 */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* 顶部大标题与星星区域 */
        .main-header-zone {
            text-align: center;
            margin-bottom: 45px;
        }
        .header-star-icon {
            font-size: 38px;
            color: #fab1a0;
            margin-bottom: 12px;
            animation: starGentleGlow 3s infinite ease-in-outAlternate;
        }
        .main-header-zone h1 {
            font-size: 30px;
            color: var(--text-main-color);
            font-weight: 800;
            margin-bottom: 14px;
            letter-spacing: 1px;
        }
        .main-header-zone p {
            font-size: 15px;
            color: var(--text-sub-color);
            opacity: 0.85;
        }

        /* 🛠️ 核心要求：严格维持 2*2 矩阵排列分布不变，并在大屏中央全面等比放大 */
        .grid-matrix-2x2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 绝对锁死两列 */
            gap: 24px; /* 电脑宽屏呼吸感间距 */
            width: 100%;
        }

        /* 卡片面板细节：优化PC端 Hover 鼠标手势与微阴影融合 */
        .feature-card-item {
            background: #ffffff;
            border-radius: 26px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-start; /* 图标、标题、描述向左整齐对齐 */
            text-align: left;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(61, 52, 46, 0.015);
            border: 1px solid rgba(0, 0, 0, 0.005);
            transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.35s;
        }
        /* PC专属悬停：卡片微微浮起，产生高档空气感 */
        .feature-card-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(61, 52, 46, 0.05);
        }

        /* 🛠️ 核心机制：自适应图标壳。完美支持后续一键替换为你自己的图片素材 */
        .icon-hub-box {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px; /* 原生 Emoji 大小比例 */
            margin-bottom: 18px;
            position: relative;
        }
        /* 当变量检测到图片路径时，自动用伪元素盖在原生文字上方实现100%精准覆盖 */
        .icon-hub-box::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            display: none;
        }
        
        /* 独立绑定各位置变量 */
        #hub-1::after { background-image: var(--custom-icon-img-1); }
        #hub-2::after { background-image: var(--custom-icon-img-2); }
        #hub-3::after { background-image: var(--custom-icon-img-3); }
        #hub-4::after { background-image: var(--custom-icon-img-4); }

        /* 自动化路径拦截类名（当变量不为 none 时开启图片渲染） */
        .feature-card-item:has(span) { /* 保持稳定 */ }

        .card-title-text {
            font-size: 18px;
            color: var(--text-main-color);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .card-desc-text {
            font-size: 13.5px;
            color: var(--text-sub-color);
            line-height: 1.55;
            opacity: 0.85;
        }

        @keyframes starGentleGlow { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <!-- 🛠️ PC端网页全屏黄金中置主承载舱 -->
    <div class="pc-fullscreen-center-deck">
        
        <!-- 顶部题头区 -->
        <div class="main-header-zone">
            <div class="header-star-icon">⭐</div>
            <h1>我，和我的对话</h1>
            <p>给自己和情绪一些留白，在这里，允许一切自然发生...</p>
        </div>

        <!-- 🛠️ 严格锁死 2×2 横向开阔网格阵列 -->
        <div class="grid-matrix-2x2">
            
            <!-- 卡片 1：情绪急救包 -->
            <div class="feature-card-item" onclick="window.location.href='sos.html'">
                <div class="icon-hub-box" id="hub-1">💼</div>
                <div class="card-title-text">情绪急救包</div>
                <div class="card-desc-text">宣泄 ➔ 降温 ➔ 承接，快速排解强烈 emo</div>
            </div>

            <!-- 卡片 2：给情绪降温 -->
            <div class="feature-card-item" onclick="window.location.href='cooling.html'">
                <div class="icon-hub-box" id="hub-2">🍃</div>
                <div class="card-title-text">给情绪降温</div>
                <div class="card-desc-text">通过多步理性反思，跳出情绪反刍</div>
            </div>

            <!-- 卡片 3：注入积极能量 -->
            <div class="feature-card-item" onclick="window.location.href='energy.html'">
                <div class="icon-hub-box" id="hub-3">☀️</div>
                <div class="card-title-text">注入积极能量</div>
                <div class="card-desc-text">挖掘个人优势，书写感恩日记</div>
            </div>

            <!-- 卡片 4：正念冥想空间 -->
            <div class="feature-card-item" onclick="window.location.href='meditation.html'">
                <div class="icon-hub-box" id="hub-4">🧘</div>
                <div class="card-title-text">冥想</div>
                <div class="card-desc-text">轻听颂钵与白噪音，获得内心平静</div>
            </div>

        </div>

    </div>

    <script>
        // 脚本注入层：自动识别图片路径激活机制，保障图片和 Emoji 的无缝平滑切换
        document.querySelectorAll('.icon-hub-box').forEach(hub => {
            const currentComputedStyle = getComputedStyle(document.documentElement);
            const customImgUrl = currentComputedStyle.getPropertyValue(`--custom-icon-img-${hub.id.split('-')[1]}`).trim();
            if (customImgUrl && customImgUrl !== 'none') {
                // 如果发现图片路径存在，注入特定的微调类名，用你的独立素材图片压制并覆盖文字
                hub.style.color = 'transparent';
                const styleEl = document.createElement('style');
                styleEl.innerHTML = `#${hub.id}::after { display: block; }`;
                document.head.appendChild(styleEl);
            }
        });
    </script>
</body>
</html>
